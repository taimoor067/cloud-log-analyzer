<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log Analyzer — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: #e8e8e5;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #eff6ff;
      --error: #dc2626;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ANIMATION 1 — whole wrapper fades up on load */
    .wrapper {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ANIMATION 2 — brand fades in slightly before card */
    .brand {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.5s ease 0.05s both;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      /* ANIMATION 3 — subtle pulse on the icon */
      animation: fadeUp 0.5s ease 0.05s both;
      transition: transform 0.2s ease;
    }

    .brand-icon:hover { transform: scale(1.07); }

    .brand-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .brand h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .brand p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ANIMATION 4 — card fades in after brand */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      animation: fadeUp 0.5s ease 0.15s both;
      /* ANIMATION 5 — card lifts slightly on hover */
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .card:hover {
      box-shadow: 0 4px 6px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease both;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }

    /* ANIMATION 6 — button shimmer on hover */
    .btn {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
      transform: translateY(-1px);
    }

    .btn:active { transform: scale(0.99) translateY(0); }

    /* ANIMATION 7 — footer fades in last */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 20px;
      animation: fadeUp 0.5s ease 0.3s both;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M9 12h6M9 16h6M9 8h6M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </div>
      <h1>Log Analyzer</h1>
      <p>Secure Cloud Admin Portal</p>
    </div>

    <div class="card">
      <div class="card-title">Sign in to continue</div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert">{{ messages[0] }}</div>
        {% endif %}
      {% endwith %}

      <form method="POST">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" autocomplete="username" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn">Sign in</button>
      </form>
    </div>

    <div class="footer-note">
      CS-508 · Cloud Computing Project<br>
      <span style="font-size:11px; color:#2563eb; display:block; line-height:1.8; font-weight:500;">
        Taimoor Zulfiqar · Kannaz Shafqat<br>
        Abdul Rehman · Muhammad Ahmad
      </span>
    </div>

  </div>
</body>
</html>
